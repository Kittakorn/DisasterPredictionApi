# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy container app to Azure Web App - DisasterPredictionApi

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: 'ubuntu-latest'

    steps:
    - uses: actions/checkout@v2

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Log in to registry
      uses: docker/login-action@v2
      with:
        registry: https://disasterpredictionapi.azurecr.io/
        username: ${{ secrets.AzureAppService_ContainerUsername_46439a78353147b4ad52222679f59087 }}
        password: ${{ secrets.AzureAppService_ContainerPassword_cc146213ff764539a8d7386665762948 }}

    - name: Build and push container image to registry
      uses: docker/build-push-action@v3
      with:
        push: true
        tags: disasterpredictionapi.azurecr.io/${{ secrets.AzureAppService_ContainerUsername_46439a78353147b4ad52222679f59087 }}/disasterpredictionapi:${{ github.sha }}
        file: ./Dockerfile

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
    - name: Deploy to Azure Web App
      id: deploy-to-webapp
      uses: azure/webapps-deploy@v2
      with:
        app-name: 'DisasterPredictionApi'
        slot-name: 'production'
        publish-profile: ${{ secrets.AzureAppService_PublishProfile_79576ff8b4b147aa9ced649ea853d855 }}
        images: 'disasterpredictionapi.azurecr.io/${{ secrets.AzureAppService_ContainerUsername_46439a78353147b4ad52222679f59087 }}/disasterpredictionapi:${{ github.sha }}'